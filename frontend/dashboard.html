<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS AI — DASHBOARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #05070d; color: white;
            min-height: 100vh; display: flex;
            justify-content: center; align-items: center; padding: 20px;
        }
        body::before {
            content: ""; position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #00f0ff15, transparent 40%),
                        radial-gradient(circle at bottom left, #ff00ff15, transparent 40%);
            z-index: -1;
        }
        .dashboard-container {
            width: 100%; max-width: 800px; background: rgba(10, 15, 25, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.2); backdrop-filter: blur(12px);
            border-radius: 22px; padding: 40px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
        }
        h1 { color: #00f0ff; font-size: 2.5rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 10px; text-shadow: 0 0 15px rgba(0, 240, 255, 0.6); }
        .welcome-text { color: #c9d4ff; font-size: 16px; font-weight: bold; margin-bottom: 30px; }
        .system-panel { background: #101826; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 25px; margin-bottom: 25px; text-align: left; }
        .panel-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 15px; font-weight: bold; }
        .panel-row:last-child { border-bottom: none; }
        .panel-label { color: #8ea1d1; }
        .panel-value { color: #00ff9d; }
        .logout-btn {
            padding: 14px 30px; border: none; border-radius: 12px;
            background: linear-gradient(90deg, #ff007f, #ff00ff); color: white;
            font-size: 16px; font-weight: 900; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
        }
        .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px #ff007f; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>ACCESS GRANTED</h1>
        <p class="welcome-text">WELCOME TO THE ANIS AI MAIN TERMINAL CORE</p>
        <div class="system-panel">
            <div class="panel-row">
                <span class="panel-label"><i class="fa-solid fa-user-shield"></i> OPERATOR STATUS:</span>
                <span class="panel-value">AUTHORIZED ROOT ADMIN</span>
            </div>
            <div class="panel-row">
                <span class="panel-label"><i class="fa-solid fa-server"></i> BACKEND DEPLOYMENT:</span>
                <span class="panel-value" style="color: #00f0ff;">RENDER LIVE INSTANCE</span>
            </div>
            <div class="panel-row">
                <span class="panel-label"><i class="fa-solid fa-microchip"></i> NEURAL ENGINE:</span>
                <span class="panel-value">GEMINI-2.5-FLASH ACTIVE</span>
            </div>
            <div class="panel-row">
                <span class="panel-label"><i class="fa-solid fa-circle-check"></i> SECURITY INTEGRITY:</span>
                <span class="panel-value">BYPASS DECRYPTION STABLE</span>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-power-off"></i> DISCONNECT SESSION</button>
    </div>
    <script>
        if (localStorage.getItem("anis_ai_logged") !== "true") { window.location.href = "index.html"; }
        function logout() {
            localStorage.removeItem("anis_ai_logged");
            sessionStorage.removeItem("anis_token");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
