<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anis-AI-Shield | Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #030508; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .dashboard-container { width: 100%; max-width: 600px; background: rgba(10, 15, 25, 0.8); border: 1px solid rgba(0, 240, 255, 0.2); backdrop-filter: blur(15px); border-radius: 16px; padding: 30px; text-align: center; }
        h1 { color: #00f0ff; font-size: 2rem; margin-bottom: 10px; }
        .sys-panel { background: #0a0d14; border-radius: 10px; padding: 20px; margin-top: 20px; text-align: left; border: 1px solid rgba(255,255,255,0.05); }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; font-weight: 600;}
        .row:last-child { border-bottom: none; }
        .label { color: #8ea1d1; }
        .val { color: #00ff9d; }
        .logout { margin-top: 25px; padding: 12px 25px; background: #ff3333; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1><i class="fa-solid fa-shield-check"></i> ROOT ACCESS GRANTED</h1>
        <p>Welcome to the core system.</p>
        <div class="sys-panel">
            <div class="row"><span class="label">Status:</span> <span class="val">ONLINE</span></div>
            <div class="row"><span class="label">Security:</span> <span class="val">BYPASSED</span></div>
            <div class="row"><span class="label">Node:</span> <span class="val" style="color:#00f0ff">Anis-AI-Shield Master</span></div>
        </div>
        <button class="logout" onclick="logout()">DISCONNECT</button>
    </div>
    <script>
        if (localStorage.getItem("anis_ai_logged") !== "true") window.location.href = "index.html";
        function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
