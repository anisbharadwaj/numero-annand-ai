<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat System Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

/* layout */
.container {
  display: flex;
  height: 100vh;
}

/* sidebar */
.sidebar {
  width: 260px;
  background: #111827;
  padding: 15px;
}

/* chat area */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* header */
.header {
  padding: 15px;
  background: #0f172a;
  text-align: center;
  color: #00f5ff;
  font-weight: bold;
}

/* messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 8px;
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #00f5ff;
  color: black;
  margin-left: auto;
}

.ai {
  background: #1f2937;
  margin-right: auto;
}

/* input */
.inputBox {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  margin-left: 8px;
  padding: 10px;
  border: none;
  background: #00f5ff;
  cursor: pointer;
}

/* login */
.login {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0b0f1a;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login input {
  margin: 5px;
  padding: 10px;
  width: 220px;
}

</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div class="login" id="loginPage">
  <h2>Login AI System</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div class="container" id="app" style="display:none;">

  <div class="sidebar">
    <h3>🤖 AI Panel</h3>
    <p>Status: Online</p>
    <button onclick="startVoice()">🎤 Speak</button>
  </div>

  <div class="chat">

    <div class="header">⚡ ChatGPT Pro AI</div>

    <div class="messages" id="chatBox"></div>

    <div class="inputBox">
      <input id="msg" placeholder="Ask something...">
      <button onclick="send()">Send</button>
    </div>

  </div>
</div>

<script>

// 🔥 CHANGE THIS TO YOUR RENDER BACKEND URL
const backend = "https://your-render-url.onrender.com";

let token = "";

// ---------------- AUTH ----------------

async function register(){
  await fetch(backend + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  alert("Registered! Now login");
}

async function login(){
  const res = await fetch(backend + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();

  token = data.token;

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

// ---------------- CHAT ----------------

async function send(){
  const text = msg.value;
  if(!text) return;

  addMessage(text, "user");
  msg.value = "";

  const res = await fetch(backend + "/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      token: token,
      message: text
    })
  });

  const data = await res.json();

  addMessage(data.reply, "ai");

  speak(data.reply);
}

// ---------------- UI ----------------

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chatBox").appendChild(div);

  div.scrollIntoView();
}

// ---------------- VOICE INPUT ----------------

function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Voice not supported in this browser");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "en-US";
  rec.start();

  rec.onresult = function(e){
    msg.value = e.results[0][0].transcript;
  }
}

// ---------------- VOICE OUTPUT ----------------

function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
