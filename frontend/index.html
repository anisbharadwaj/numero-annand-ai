<!DOCTYPE html>
<html>
<head>
<title>ChatGPT Pro AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

.container {
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#111827;
  padding:10px;
}

/* CHAT */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.header {
  padding:15px;
  background:#0f172a;
  text-align:center;
  color:#00f5ff;
  font-weight:bold;
}

.messages {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.user { background:#00f5ff; color:black; text-align:right; }
.ai { background:#1f2937; }

/* INPUT */
.input {
  display:flex;
  padding:10px;
  background:#111827;
}

input {
  flex:1;
  padding:10px;
}

button {
  margin-left:10px;
  background:#00f5ff;
  border:none;
  padding:10px;
  cursor:pointer;
}

/* LOGIN */
.login {
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:#0b0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.login input {
  margin:5px;
  width:200px;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div class="login" id="loginBox">
  <h2>Login / Register</h2>
  <input id="user" placeholder="username">
  <input id="pass" placeholder="password" type="password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;">

<div class="sidebar">
  <h3>💬 ChatGPT Pro</h3>
</div>

<div class="chat">

<div class="header">⚡ AI Assistant</div>

<div class="messages" id="chat"></div>

<div class="input">
  <input id="msg" placeholder="Ask AI...">
  <button onclick="send()">Send</button>
</div>

</div>
</div>

<script>

const backend = "https://your-render-url.onrender.com";

let token = "";

// ---------- AUTH ----------
async function register(){
  await fetch(backend+"/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  alert("Registered! Now login");
}

async function login(){
  const res = await fetch(backend+"/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  const data = await res.json();
  token = data.token;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="flex";
}

// ---------- CHAT ----------
async function send(){
  const msg = document.getElementById("msg").value;

  add(msg, "user");

  const res = await fetch(backend+"/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({token, message:msg})
  });

  const data = await res.json();

  add(data.reply, "ai");
}

function add(text,type){
  const div = document.createElement("div");
  div.className = "msg "+type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
