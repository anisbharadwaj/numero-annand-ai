<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anis-AI-Shield</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="login-view" class="container">
        <div class="cyber-panel">
            <div class="logo">
                <i class="fa-solid fa-shield-virus glow-cyan"></i>
                <h1>ANIS-AI-SHIELD</h1>
                <p>SECURE MULTI-NODE TERMINAL</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>RENDER URL (USERNAME) <span class="helper">[ex: https://user1.onrender.com]</span></label>
                    <input type="text" id="username" placeholder="Enter Deployment URL" required>
                </div>
                
                <div class="input-group">
                    <label>SECURE PASSWORD <span class="helper">[Unique access key]</span></label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="verify-box">
                    <input type="checkbox" id="humanCheck" required>
                    <label for="humanCheck">I AM HUMAN — VERIFY IDENTITY</label>
                </div>

                <button type="submit" id="loginBtn" class="cyber-btn">
                    <i class="fa-solid fa-terminal"></i> INITIATE CONNECTION
                </button>
            </form>

            <div id="health-monitor" class="status-box warning">
                <i class="fas fa-spinner fa-spin"></i> WAKING SERVER...
            </div>
        </div>
    </div>

    <div id="dashboard-view" class="container hidden">
        <div class="dashboard-header">
            <h2><i class="fa-solid fa-server"></i> SYSTEM OVERVIEW</h2>
            <button id="logoutBtn" class="danger-btn">DISCONNECT</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>NODE IDENTITY</h3>
                <p id="dash-user" class="text-blue">---</p>
            </div>
            <div class="stat-card">
                <h3>UPTIME</h3>
                <p id="dash-uptime" class="text-green">---</p>
            </div>
            <div class="stat-card">
                <h3>AI CORE</h3>
                <p id="dash-ai" class="text-cyan">STANDBY</p>
            </div>
        </div>
    </div>

    <button id="openAiBtn" class="hidden"><i class="fa-solid fa-brain"></i></button>
    <div id="ai-widget" class="hidden">
        <div class="ai-header">
            <span><i class="fa-solid fa-robot"></i> Anis AI</span>
            <button id="closeAi"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="ai-chat" id="chatBox"></div>
        <div class="ai-input">
            <input type="text" id="aiInput" placeholder="Command AI...">
            <button id="sendAi"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
