<!DOCTYPE html>
<html>
<head>
<title>ANIS AI SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  font-size:28px;
  color:#00f5ff;
  text-shadow:0 0 10px #00f5ff;
  padding:15px;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:350px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid #00f5ff;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#111;
  border:none;
  color:white;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:linear-gradient(90deg,#00f5ff,#ff00d4);
  border:none;
  cursor:pointer;
}

/* FLOATING AI WIDGET */
.ai-widget{
  position:fixed;
  bottom:20px;
  right:20px;
  width:250px;
  background:#111;
  border:1px solid #00f5ff;
  border-radius:10px;
  overflow:hidden;
}

.ai-header{
  background:#00f5ff;
  color:black;
  padding:8px;
  cursor:pointer;
  font-weight:bold;
}

.ai-body{
  display:none;
  padding:10px;
}

.ai-input{
  width:100%;
  padding:8px;
  margin-top:8px;
}

/* TOP BUTTONS */
.topbar{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.small-btn{
  padding:8px;
  width:120px;
  background:#222;
  border:1px solid #00f5ff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">⚡ ANIS AI SYSTEM ⚡</div>

<!-- TOP CONTROLS -->
<div class="topbar">
  <button class="small-btn" onclick="launch()">🚀 Launch</button>
  <button class="small-btn" onclick="check()">🩺 Check</button>
</div>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="card">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- FLOATING AI -->
<div class="ai-widget">
  <div class="ai-header" onclick="toggleAI()">🤖 Anis AI</div>

  <div class="ai-body" id="aiBody">
    <input id="q" class="ai-input" placeholder="Ask AI...">
    <button onclick="askAI()">Send</button>
    <div id="ans"></div>
  </div>
</div>

<script>

const backend = "https://protected-ethical-anis-ai-12.onrender.com";

let token = "";

/* REGISTER */
async function register(){
  await fetch(backend+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  });

  alert("Registered");
}

/* LOGIN */
async function login(){
  const res = await fetch(backend+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.token){
    token = data.token;
    loginPage.style.display="none";
  } else {
    alert("Login failed");
  }
}

/* FLOAT AI */
function toggleAI(){
  const b = document.getElementById("aiBody");
  b.style.display = (b.style.display==="block")?"none":"block";
}

/* ASK AI */
async function askAI(){
  const res = await fetch(backend+"/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:q.value})
  });

  const data = await res.json();
  ans.innerHTML = data.reply;
}

/* HEALTH CHECK */
async function check(){
  const start = Date.now();

  const res = await fetch(backend+"/health");
  const data = await res.json();

  const time = Date.now() - start;

  alert("STATUS: "+data.status+"\nUPTIME: "+data.uptime+"\nTIME: "+time+"ms");
}

/* LAUNCH */
function launch(){
  alert("System Check Running...");
  check();
}

</script>

</body>
</html>
