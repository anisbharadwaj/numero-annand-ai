<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ANIS AI SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:white;
}

.title{
  text-align:center;
  font-size:32px;
  color:#00f5ff;
  text-shadow:0 0 10px #00f5ff;
  margin-top:20px;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:350px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid #00f5ff;
  border-radius:12px;
  box-shadow:0 0 20px #00f5ff;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:10px;
  background:linear-gradient(90deg,#00f5ff,#ff00d4);
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* CHAT */
.container{
  display:none;
  height:100vh;
}

.chat{
  padding:10px;
}

.msg{
  margin:8px;
  padding:10px;
  border-radius:10px;
}

.user{background:#00f5ff;color:black;margin-left:auto;}
.ai{background:#222;}
</style>
</head>

<body>

<div class="title">⚡ ANIS AI SYSTEM ⚡</div>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="card">
    <h3>LOGIN</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- CHAT -->
<div class="container" id="app">
  <div id="messages"></div>

  <input id="msg" placeholder="Ask AI...">
  <button onclick="send()">Send</button>
</div>

<script>

const backend = "https://protected-ethical-anis-ai-12.onrender.com";

let token = "";

/* REGISTER */
async function register(){
  await fetch(backend+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  });

  alert("Registered");
}

/* LOGIN */
async function login(){
  const res = await fetch(backend+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.token){
    token = data.token;

    // SAVE TOKEN (IMPORTANT FIX)
    localStorage.setItem("token", token);

    loginPage.style.display="none";
    app.style.display="block";
  }else{
    alert("Login failed");
  }
}

/* CHAT */
async function send(){
  const saved = localStorage.getItem("token");

  const res = await fetch(backend+"/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      token:saved,
      message:msg.value
    })
  });

  const data = await res.json();

  const div = document.createElement("div");
  div.className="msg ai";
  div.innerText=data.reply;
  messages.appendChild(div);

  msg.value="";
}

</script>

</body>
</html>
