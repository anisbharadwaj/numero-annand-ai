<!DOCTYPE html>
<html>
<head>
<title>Ultra AI System</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle, #050816, #000);
  color:white;
}

.container {
  width: 400px;
  margin: 50px auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

input {
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:6px;
}

button {
  width:100%;
  padding:10px;
  background:#00f5ff;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.chat {
  display:none;
}

.msg {
  padding:8px;
  margin:5px;
  border-radius:8px;
}

.user { background:#00f5ff; color:black; text-align:right; }
.ai { background:#1f2937; }

</style>
</head>

<body>

<div class="container" id="loginBox">
  <h2>🔐 Ultra AI Login</h2>
  <input id="user" placeholder="Username" />
  <input id="pass" type="password" placeholder="Password" />
  <button onclick="login()">Login</button>
</div>

<div class="container chat" id="chatBox">
  <h3>⚡ Ultra AI Chat</h3>

  <div id="chat"></div>

  <input id="msg" placeholder="Ask AI..." />
  <button onclick="send()">Send</button>
</div>

<script>
const backend = "https://protected-ethical-anis-ai-12.onrender.com";

let token = "";

async function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const res = await fetch(backend + "/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({username:u, password:p})
  });

  const data = await res.json();

  if(data.token){
    token = data.token;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("chatBox").style.display="block";
  } else {
    alert("Login Failed");
  }
}

async function send() {
  const msg = document.getElementById("msg").value;

  add(msg,"user");

  const res = await fetch(backend + "/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({message: msg, token})
  });

  const data = await res.json();
  add(data.reply,"ai");
}

function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
