<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ANIS AI CORE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  background: #050510;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Orbitron", sans-serif;
  color: #00f5ff;
  overflow: hidden;
}

/* glow background */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: #00f5ff;
  filter: blur(200px);
  opacity: 0.15;
  top: -100px;
  left: -100px;
}

.container {
  width: 90%;
  max-width: 650px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(0,245,255,0.2);
  border-radius: 18px;
  padding: 30px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0,245,255,0.2);
  text-align: center;
  position: relative;
}

h1 {
  font-size: 26px;
  letter-spacing: 2px;
  text-shadow: 0 0 20px #00f5ff;
}

p {
  color: #7df9ff;
  font-size: 13px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  background: transparent;
  border: 1px solid #00f5ff;
  color: #00f5ff;
  outline: none;
  margin-bottom: 15px;
  text-align: center;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
  transition: 0.3s;
}

.neon {
  background: #00f5ff;
  color: #000;
  box-shadow: 0 0 20px #00f5ff;
}

.neon:hover {
  box-shadow: 0 0 40px #00f5ff;
  transform: scale(1.03);
}

.darkbtn {
  background: transparent;
  border: 1px solid #00f5ff;
  color: #00f5ff;
}

.status {
  margin-top: 20px;
  padding: 12px;
  border: 1px solid rgba(0,245,255,0.3);
  border-radius: 10px;
  font-size: 13px;
  color: #7df9ff;
}
</style>
</head>

<body>

<div class="container">
  <h1>⚡ ANIS AI CORE SYSTEM</h1>
  <p>Neural Intelligence • Secure Framework • Monitoring Active</p>

  <input id="backendUrl" placeholder="Enter Render Backend URL"/>

  <button class="neon" onclick="checkBackend()">CHECK SYSTEM</button>
  <button class="darkbtn" onclick="launchAI()">ENTER AI CORE</button>

  <div class="status" id="status">STATUS: STANDBY</div>
</div>

<script>
function getURL() {
  return document.getElementById("backendUrl").value.trim();
}

async function checkBackend() {
  try {
    const res = await fetch(getURL() + "/health");
    const data = await res.json();

    document.getElementById("status").innerText =
      "STATUS: ONLINE ✔ " + JSON.stringify(data);

  } catch (e) {
    document.getElementById("status").innerText =
      "STATUS: OFFLINE ✖";
  }
}

function launchAI() {
  window.open(window.location.href, "_blank");
}
</script>

</body>
</html>
