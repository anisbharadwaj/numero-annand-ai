<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1f;
  color: white;
}

.header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  color: #00f5ff;
}

.chat {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  max-width: 70%;
  word-wrap: break-word;
}

.user {
  background: #00f5ff;
  color: black;
  margin-left: auto;
  text-align: right;
}

.ai {
  background: #1f2937;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
  border-radius: 5px;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  background: #00f5ff;
  border: none;
  cursor: pointer;
  font-weight: bold;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="header">⚡ ANIS AI CHAT SYSTEM</div>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Ask something..." />
  <button onclick="send()">Send</button>
</div>

<script>
/* ✅ YOUR REAL BACKEND (RENDER) */
const backend = "https://protected-ethical-anis-ai-12.onrender.com";

async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  try {
    const res = await fetch(backend + "/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    addMessage(data.reply, "ai");

  } catch (err) {
    addMessage("⚠️ Backend Error. Check Render server.", "ai");
  }
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}
</script>

</body>
</html>
