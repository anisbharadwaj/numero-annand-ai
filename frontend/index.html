<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Protected Ethical Anis AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 { margin-bottom: 10px; }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    button.secondary {
      background: #10b981;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Protected Ethical Anis AI</h1>

    <p>Enter backend URL (Render):</p>

    <input id="backendUrl" placeholder="https://your-backend.onrender.com" />

    <button onclick="checkHealth()">Check Backend Health</button>
    <button class="secondary" onclick="launchAI()">Launch AI System</button>

    <div class="status" id="status">Status: Waiting...</div>
  </div>

  <script>
    const DEFAULT_BACKEND = "https://your-backend.onrender.com";

    function getBackend() {
      const val = document.getElementById("backendUrl").value.trim();
      return val || DEFAULT_BACKEND;
    }

    async function checkHealth() {
      const url = getBackend();
      const status = document.getElementById("status");

      try {
        const res = await fetch(url + "/health");
        const data = await res.json();
        status.innerText = "Status: " + data.message;
      } catch (err) {
        status.innerText = "Status: Backend not reachable";
      }
    }

    function launchAI() {
      const url = getBackend();
      window.open(url + "/docs", "_blank");
    }
  </script>
</body>
</html>
