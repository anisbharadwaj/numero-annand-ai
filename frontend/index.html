<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Protected Ethical Anis AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: #111827;
      padding: 40px;
      border-radius: 16px;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 14px 26px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Protected Ethical Anis AI</h1>

    <p>
      Advanced ethical AI monitoring and protected intelligence framework
      designed for secure and responsible AI systems.
    </p>

    <!-- IMPORTANT BUTTON -->
    <a class="btn"
       id="launchBtn"
       href="#"
       target="_blank">
      Launch AI System
    </a>

    <div class="note">
      Backend URL will be connected after deployment
    </div>
  </div>

  <script>
    // 🔥 CHANGE THIS AFTER BACKEND DEPLOYMENT
    const BACKEND_URL = "https://YOUR-BACKEND-URL.onrender.com/docs";

    document.getElementById("launchBtn").href = BACKEND_URL;
  </script>

</body>
</html>
