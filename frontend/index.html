<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chat Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b0f1a, #05070d);
  color: white;
}

/* LOGIN */
.login {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-card {
  width: 360px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(0,255,255,0.2);
  backdrop-filter: blur(10px);
  text-align: center;
}

.login-card input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  outline: none;
}

.login-card button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(90deg, #00f5ff, #ff00d4);
}

/* APP */
.container {
  display: flex;
  height: 100vh;
  display: none;
}

.sidebar {
  width: 240px;
  background: #0f172a;
  padding: 15px;
}

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 15px;
  text-align: center;
  background: #111827;
  color: #00f5ff;
  font-weight: bold;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 8px;
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
  word-wrap: break-word;
}

.user {
  background: #00f5ff;
  color: black;
  margin-left: auto;
}

.ai {
  background: #1f2937;
  margin-right: auto;
}

.inputBox {
  display: flex;
  padding: 10px;
  background: #0f172a;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  margin-left: 8px;
  padding: 10px;
  border: none;
  background: #00f5ff;
  cursor: pointer;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="login-card">
    <h2>⚡ AI Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="sidebar">
    <h3>🤖 AI System</h3>
    <button onclick="startVoice()">🎤 Speak</button>
  </div>

  <div class="chat">

    <div class="header">⚡ ChatGPT Style AI</div>

    <div class="messages" id="messages"></div>

    <div class="inputBox">
      <input id="msg" placeholder="Ask AI..." />
      <button onclick="send()">Send</button>
    </div>

  </div>
</div>

<script>

// 🔴 YOUR RENDER BACKEND URL
const backend = "https://protected-ethical-anis-ai-12.onrender.com";

let token = "";

// ---------- REGISTER ----------
async function register() {
  await fetch(backend + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  alert("Registered! Now login.");
}

// ---------- LOGIN ----------
async function login() {
  const res = await fetch(backend + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();
  token = data.token;

  loginPage.style.display = "none";
  app.style.display = "flex";
}

// ---------- CHAT ----------
async function send() {
  const text = msg.value;
  if (!text) return;

  add(text, "user");
  msg.value = "";

  const res = await fetch(backend + "/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      token: token,
      message: text
    })
  });

  const data = await res.json();
  add(data.reply, "ai");
  speak(data.reply);
}

// ---------- UI ----------
function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  messages.appendChild(div);
  div.scrollIntoView();
}

// ---------- VOICE ----------
function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice not supported");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "en-US";
  rec.start();

  rec.onresult = (e) => {
    msg.value = e.results[0][0].transcript;
  };
}

// ---------- SPEAK ----------
function speak(text) {
  const s = new SpeechSynthesisUtterance(text);
  s.lang = "en-US";
  window.speechSynthesis.speak(s);
}

</script>

</body>
</html>
