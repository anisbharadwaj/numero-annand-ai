<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ANIS AI CORE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050510;
  color: white;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 15px;
  background: #0a0a20;
  text-align: center;
  color: #00f5ff;
  font-weight: bold;
}

.chat {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.msg {
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #00f5ff;
  color: black;
  margin-left: auto;
}

.ai {
  background: #1a1a3d;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #0a0a20;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  background: #00f5ff;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    ⚡ ANIS AI CHAT CORE
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-box">
    <input id="msg" placeholder="Ask something..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
const backend = "https://protected-ethical-anis-ai-12.onrender.com";

async function send() {
  const input = document.getElementById("msg");
  const text = input.value;

  addMessage(text, "user");
  input.value = "";

  const res = await fetch(backend + "/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });

  const data = await res.json();
  addMessage(data.reply, "ai");
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
