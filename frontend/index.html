<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS AI SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #05070d;
            color: white;
            overflow-y: auto;
            overflow-x: hidden;
        }
        body::before {
            content: ""; position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at top left, #00f0ff22, transparent 35%),
                        radial-gradient(circle at bottom right, #ff00ff22, transparent 35%);
            z-index: -1;
        }
        .main-container {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center;
            padding: 20px; padding-top: 60px;
        }
        .login-box {
            width: 100%; max-width: 520px; background: rgba(10, 15, 25, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.2); backdrop-filter: blur(12px);
            border-radius: 22px; padding: 40px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), 0 0 80px rgba(255, 0, 255, 0.12);
        }
        .logo { text-align: center; margin-bottom: 35px; }
        .logo h1 {
            font-size: 3rem; font-weight: 900; color: #00f0ff; letter-spacing: 3px;
            text-shadow: 0 0 10px #00f0ff, 0 0 30px #00f0ff;
        }
        .logo p { margin-top: 10px; color: #c9d4ff; font-size: 15px; font-weight: bold; }
        .label { display: block; margin-bottom: 10px; margin-top: 18px; font-size: 15px; font-weight: 900; color: #ffffff; letter-spacing: 1px; }
        .input-box {
            width: 100%; padding: 16px; background: #101826; color: white;
            font-size: 16px; font-weight: bold; border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px; outline: none; transition: 0.3s;
        }
        .input-box:focus { border: 2px solid #00f0ff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); }
        .info-box { margin-top: 18px; padding: 14px; background: #0f1624; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08); }
        .info-box p { margin: 8px 0; color: #dbe4ff; font-size: 14px; font-weight: bold; }
        .captcha-box { margin-top: 22px; display: flex; align-items: center; gap: 10px; }
        .captcha-box input { width: 20px; height: 20px; }
        .captcha-box label { font-weight: 900; color: #00f0ff; }
        .login-btn {
            width: 100%; margin-top: 28px; padding: 16px; border: none; border-radius: 14px;
            background: linear-gradient(90deg, #00f0ff, #ff00ff); color: black;
            font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 0 20px #00f0ff, 0 0 40px #ff00ff; }
        .security { margin-top: 22px; text-align: center; color: #8ea1d1; font-size: 13px; font-weight: bold; }
        .status { margin-top: 25px; text-align: center; color: #00ff9d; font-weight: 900; font-size: 14px; }
        @media(max-width:600px) { .logo h1 { font-size: 2.2rem; } .login-box { padding: 28px; } .main-container { padding-top: 30px; } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="login-box">
            <div class="logo">
                <h1>ANIS AI SYSTEM</h1>
                <p>ULTRA SECURE AI TERMINAL</p>
            </div>
            <form id="loginForm">
                <label class="label">LOGIN USERNAME / IDENTIFIER</label>
                <input type="text" id="renderUrl" class="input-box" placeholder="Enter Username" required>
                
                <label class="label">SECURE PASSWORD</label>
                <input type="password" id="password" class="input-box" placeholder="Enter Secure Password" required>

                <div class="info-box">
                    <p><i class="fa-solid fa-shield-halved"></i> Only authorized Render users can access this AI.</p>
                    <p><i class="fa-solid fa-lock"></i> Protected with AI Human Verification.</p>
                    <p><i class="fa-solid fa-terminal"></i> Direct access to ANIS AI Dashboard after login.</p>
                </div>

                <div class="captcha-box">
                    <input type="checkbox" id="humanCheck" required>
                    <label for="humanCheck">I AM HUMAN — VERIFY IDENTITY</label>
                </div>

                <button type="submit" class="login-btn"><i class="fa-solid fa-right-to-bracket"></i> LAUNCH ANIS AI</button>
            </form>
            <div class="security">MILITARY GRADE AI SECURITY ENABLED</div>
            <div class="status">● AI CORE STATUS : ONLINE</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://protected-ethical-anis-ai-12.onrender.com";
        const form = document.getElementById("loginForm");

        form.addEventListener("submit", async function(e) {
            e.preventDefault();
            const renderUrl = document.getElementById("renderUrl").value.trim();
            const password = document.getElementById("password").value;
            const humanCheck = document.getElementById("humanCheck").checked;
            const btn = document.querySelector(".login-btn");

            if (!humanCheck) { alert("[ACCESS DENIED]: Please confirm you are human."); return; }
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> RUNNING DECRYPTION CHECK...`;
            btn.disabled = true;

            const urlEncodedData = new URLSearchParams();
            urlEncodedData.append("username", renderUrl);
            urlEncodedData.append("password", password);
            urlEncodedData.append("captcha_verified", "true");

            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: urlEncodedData
                });
                const data = await response.json();
                if (!response.ok) { throw new Error(data.detail || "Authentication mapping failure."); }

                if (data.requires_biometrics) {
                    const bioResponse = await fetch(`${API_BASE_URL}/api/login/biometric-verify`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ signature: data.biometric_challenge, userEmail: data.user_identity })
                    });
                    const bioResult = await bioResponse.json();
                    if (!bioResponse.ok) { throw new Error(bioResult.detail || "Biometric validation failed."); }

                    sessionStorage.setItem("anis_token", bioResult.access_token);
                    localStorage.setItem("anis_ai_logged", "true");
                    btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> DECRYPTION SUCCESSFUL`;
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
                }
            } catch (error) {
                alert(`[CONNECTION ERROR]: ${error.message}\n\nTip: Open ${API_BASE_URL}/health in a new tab to wake up the server!`);
                btn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> LAUNCH ANIS AI`;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
