<!DOCTYPE html>
<html>
<head>
<title>Ultra AI ChatGPT Clone</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1f;
  color: white;
}

/* SIDEBAR */
.container {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 250px;
  background: #111827;
  padding: 10px;
}

.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 15px;
  background: #0f172a;
  text-align: center;
  font-weight: bold;
  color: #00f5ff;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.msg {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

.user { background: #00f5ff; color: black; margin-left: auto; }
.ai { background: #1f2937; }

.input-box {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  margin-left: 10px;
  padding: 10px;
  background: #00f5ff;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>💬 Chats</h3>
  <p>Ultra AI Memory</p>
</div>

<!-- CHAT AREA -->
<div class="chat-area">

<div class="header">⚡ Ultra ChatGPT Clone</div>

<div class="messages" id="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Ask AI..." />
  <button onclick="send()">Send</button>
  <button onclick="voice()">🎤</button>
</div>

</div>

</div>

<script>
const backend = "https://your-render-url.onrender.com";

let token = localStorage.getItem("token");

async function send() {
  const msg = document.getElementById("msg").value;

  add(msg, "user");

  const res = await fetch(backend + "/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({message: msg, token})
  });

  const data = await res.json();

  add(data.reply, "ai");

  speak(data.reply);
}

function add(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

/* 🎤 VOICE INPUT */
function voice(){
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.start();

  rec.onresult = function(e){
    document.getElementById("msg").value = e.results[0][0].transcript;
  }
}

/* 🔊 VOICE OUTPUT */
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
