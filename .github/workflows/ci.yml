name: Audit CI

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest uvicorn httpx

      - name: Ensure sample fixture exists
        run: |
          mkdir -p tests/fixtures
          python tests/generate_sample.py || echo "generator missing; ensure tests/fixtures/sample.csv exists"

      - name: Run unit tests
        run: |
          pytest -q --maxfail=1 || true
        continue-on-error: true

      - name: Start backend for integration tests
        run: |
          python -m uvicorn backend.app:app --host 127.0.0.1 --port 8000 &
          sleep 3

      - name: Run integration and e2e tests
        run: |
          pytest tests/test_end_to_end_audit.py -q || true
        continue-on-error: true

      - name: Redact artifacts for PII
        run: |
          mkdir -p reports
          # Example: copy pytest junit xml if produced and run a simple redaction
          if [ -f junit.xml ]; then cp junit.xml reports/junit.xml; fi
          # run a simple grep-based scrub (customize as needed)
          if [ -d reports ]; then sed -i -E 's/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,6}/[REDACTED_EMAIL]/g' reports/* || true; fi

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: reports/
