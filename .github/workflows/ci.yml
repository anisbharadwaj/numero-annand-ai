name: Audit CI

on:
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest uvicorn httpx

      - name: Ensure sample fixture exists
        run: |
          mkdir -p tests/fixtures
          if [ ! -f tests/fixtures/sample.csv ]; then python tests/generate_sample.py; fi
          ls -la tests/fixtures

      - name: Run unit tests
        run: |
          pytest -q --maxfail=1 || true
        continue-on-error: true

      - name: Start backend for integration tests
        run: |
          python -m uvicorn backend.app:app --host 127.0.0.1 --port 8000 &
          sleep 4

      - name: Run integration and e2e tests
        run: |
          pytest tests/test_end_to_end_audit.py -q || true
        continue-on-error: true

      - name: Collect reports
        run: |
          mkdir -p reports
          # copy any generated JSON reports or test outputs into reports/
          if [ -f junit.xml ]; then cp junit.xml reports/junit.xml; fi
          if [ -d reports_raw ]; then cp -r reports_raw/* reports/ || true; fi

      - name: Redact artifacts for PII
        run: |
          # basic redaction: emails and 10-digit numbers
          if [ -d reports ]; then
            for f in reports/*; do
              sed -i -E 's/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,6}/[REDACTED_EMAIL]/g' "$f" || true
              sed -i -E 's/\b[0-9]{10}\b/[REDACTED_PHONE]/g' "$f" || true
            done
          fi

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: reports/
